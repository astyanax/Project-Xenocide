name: Build & Test

on:
  push:
    branches: [main, master, trunk]
  pull_request:
    branches: [main, master, trunk]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup .NET 9.0
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '9.0.x'

    - name: Install MonoGame templates
      run: dotnet new install MonoGame.Templates.CSharp

    - name: Install MGCB tools
      run: |
        dotnet tool install -g dotnet-mgcb
        dotnet tool install -g dotnet-mgcb-editor

    - name: Restore dependencies
      run: dotnet restore xna/trunk/Xenocide.MonoGame/Xenocide.MonoGame.sln

    - name: Build
      run: dotnet build xna/trunk/Xenocide.MonoGame/Xenocide.MonoGame.sln --configuration Release --no-restore

    - name: Test
      run: dotnet test xna/trunk/Xenocide.MonoGame/Xenocide.MonoGame.sln --configuration Release --no-build --verbosity normal

  artifacts:
    needs: build
    runs-on: windows-latest
    if: github.event_name == 'push'

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup .NET 9.0
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '9.0.x'

    - name: Restore dependencies
      run: dotnet restore xna/trunk/Xenocide.MonoGame/Xenocide.MonoGame.sln

    - name: Publish (Windows x64)
      run: dotnet publish xna/trunk/Xenocide.MonoGame/Xenocide.MonoGame.csproj --configuration Release --runtime win-x64 --self-contained false -o publish/win-x64

    - name: Zip artifact (Windows x64)
      run: Compress-Archive -Path publish/win-x64/* -DestinationPath Xenocide-win-x64.zip

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: Xenocide
        path: |
          Xenocide-win-x64.zip
