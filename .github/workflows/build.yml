name: Build & Test

on:
  push:
    branches: [main, master, trunk]
  pull_request:
    branches: [main, master, trunk]

env:
  SOLUTION: xna/trunk/Xenocide.MonoGame.sln
  PROJECT: xna/trunk/Xenocide.MonoGame/Xenocide.MonoGame.csproj
  DOTNET_VERSION: '9.0.x'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  format:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        ref: ${{ github.head_ref || github.ref_name }}

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Install MonoGame templates
      run: dotnet new install MonoGame.Templates.CSharp

    - name: Restore
      run: dotnet restore ${{ env.SOLUTION }}

    - name: Auto-fix formatting
      run: dotnet format style ${{ env.SOLUTION }} --verbosity diagnostic

    - name: Commit formatting fixes
      uses: stefanzweifel/git-auto-commit-action@v5
      with:
        commit_message: '[skip ci] style: auto-fix imports ordering and formatting'
        commit_user_name: github-actions[bot]
        commit_user_email: github-actions[bot]@users.noreply.github.com

  build:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Install MonoGame templates
      run: dotnet new install MonoGame.Templates.CSharp

    - name: Install MGCB tools
      run: |
        dotnet tool install -g dotnet-mgcb
        dotnet tool install -g dotnet-mgcb-editor

    - name: Setup Linux content build deps (Wine + fonts)
      if: runner.os == 'Linux'
      run: |
        sudo dpkg --add-architecture i386
        sudo apt-get update
        echo "ttf-mscorefonts-installer msttcorefonts/accepted-mscorefonts-eula select true" | sudo debconf-set-selections
        sudo apt-get install -y wine wine32:i386 ttf-mscorefonts-installer

    - name: Skip broken FBX models (absolute paths)
      shell: pwsh
      run: |
        $mgcb = 'xna/trunk/Xenocide.MonoGame/Content.mgcb'
        $content = [IO.File]::ReadAllText($mgcb)
        $content = $content -replace '(?ms)^#begin Content/Models/Characters/Alien/Viper\.FBX.*?(?=\n#begin|\n$)', ''
        $content = $content -replace '(?ms)^#begin Content/Models/Characters/XCorp/FemaleShirt\.FBX.*?(?=\n#begin|\n$)', ''
        $content = $content -replace '(?ms)^#begin Content/Models/Facility/Xnet/Barracks\.FBX.*?(?=\n#begin|\n$)', ''
        [IO.File]::WriteAllText($mgcb, $content)

    - name: Skip shader compilation on Linux (Wine setup incomplete)
      if: runner.os == 'Linux'
      run: |
        sed -i '/^#begin Content\/Shaders\/GeoscapeShader\.fx/,/^$/d' xna/trunk/Xenocide.MonoGame/Content.mgcb
        sed -i '/^#begin Content\/Shaders\/skybox\.fx/,/^$/d' xna/trunk/Xenocide.MonoGame/Content.mgcb

    - name: Restore
      run: dotnet restore ${{ env.SOLUTION }}

    - name: Build
      run: dotnet build ${{ env.SOLUTION }} --configuration Release --no-restore

    - name: Test
      if: runner.os == 'Windows'
      run: dotnet test ${{ env.SOLUTION }} --configuration Release --no-build --verbosity normal

  publish:
    needs: build
    if: github.event_name == 'push'
    strategy:
      fail-fast: false
      matrix:
        include:
          - runtime: win-x64
            os: windows-latest
          - runtime: linux-x64
            os: ubuntu-latest
    runs-on: ${{ matrix.os }}

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Install MonoGame templates
      run: dotnet new install MonoGame.Templates.CSharp

    - name: Setup Linux deps (fonts)
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        echo "ttf-mscorefonts-installer msttcorefonts/accepted-mscorefonts-eula select true" | sudo debconf-set-selections
        sudo apt-get install -y ttf-mscorefonts-installer

    - name: Skip broken FBX models (absolute paths)
      shell: pwsh
      run: |
        $mgcb = 'xna/trunk/Xenocide.MonoGame/Content.mgcb'
        $content = [IO.File]::ReadAllText($mgcb)
        $content = $content -replace '(?ms)^#begin Content/Models/Characters/Alien/Viper\.FBX.*?(?=\n#begin|\n$)', ''
        $content = $content -replace '(?ms)^#begin Content/Models/Characters/XCorp/FemaleShirt\.FBX.*?(?=\n#begin|\n$)', ''
        $content = $content -replace '(?ms)^#begin Content/Models/Facility/Xnet/Barracks\.FBX.*?(?=\n#begin|\n$)', ''
        [IO.File]::WriteAllText($mgcb, $content)

    - name: Skip shaders on Linux (no Wine)
      if: runner.os == 'Linux'
      run: |
        sed -i '/^#begin Content\/Shaders\/GeoscapeShader\.fx/,/^$/d' xna/trunk/Xenocide.MonoGame/Content.mgcb
        sed -i '/^#begin Content\/Shaders\/skybox\.fx/,/^$/d' xna/trunk/Xenocide.MonoGame/Content.mgcb

    - name: Restore
      run: dotnet restore ${{ env.SOLUTION }}

    - name: Publish
      run: dotnet publish ${{ env.PROJECT }} --configuration Release --runtime ${{ matrix.runtime }} --self-contained false -o publish/${{ matrix.runtime }}

    - name: Zip artifact
      shell: pwsh
      run: Compress-Archive -Path publish/${{ matrix.runtime }}/* -DestinationPath Xenocide-${{ matrix.runtime }}.zip

    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: Xenocide-${{ matrix.runtime }}
        path: Xenocide-${{ matrix.runtime }}.zip
